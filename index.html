<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASEO — קטלוג אירועים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:#f5f0e8;color:#2a2218;overflow-x:hidden}
.sf{font-family:'Cormorant Garamond',serif}
.gc{color:#6B5210}
.tc{color:#2a8a78}
.sec{opacity:0;transform:translateY(40px);transition:all 0.8s cubic-bezier(0.25,0.46,0.45,0.94)}
.sec.vis{opacity:1;transform:translateY(0)}
.ev{background:#fff;border-radius:12px;overflow:hidden;transition:all .3s;border:1px solid #e8ddd0}
.ev:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(42,34,24,.12);border-color:#5fb8a5}
.mt{padding:10px 24px;border-radius:30px;cursor:pointer;transition:all .3s;font-weight:500;font-size:15px;border:2px solid #c4b8a8;background:transparent;color:#4a3f35;font-family:'Heebo',sans-serif}
.mt.a{background:linear-gradient(135deg,#2a8a78,#5fb8a5);color:#fff;border-color:#2a8a78}
.mt:hover:not(.a){border-color:#5fb8a5;color:#2a8a78}
.cb{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:linear-gradient(135deg,#2a8a78,#5fb8a5);color:#fff;border-radius:30px;font-size:16px;font-weight:700;text-decoration:none;transition:all .3s;border:none;cursor:pointer;font-family:'Heebo',sans-serif}
.cb:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(42,138,120,.35)}
.gp{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.gp img{width:100%;height:220px;object-fit:cover;border-radius:4px;transition:transform .4s}
.gp img:hover{transform:scale(1.03)}
.sp{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#fff;border-radius:20px;font-size:13px;border:1px solid #e8ddd0}
.ev-img{width:100%;height:140px;object-fit:cover}
.vcard{border-radius:12px;overflow:hidden;position:relative;aspect-ratio:9/16;background:#2a2218}
.vcard video{width:100%;height:100%;object-fit:cover;background:#2a2218}
.vcard .poster{width:100%;height:100%;object-fit:cover;opacity:0.7}
.vcard .play-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.vcard .play-btn{width:48px;height:48px;background:rgba(95,184,165,.88);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.3);transition:transform .2s}
.vcard .play-overlay:hover .play-btn{transform:scale(1.1)}
.vcard .label{position:absolute;bottom:0;left:0;right:0;padding:24px 10px 10px;background:linear-gradient(transparent,rgba(42,34,24,.8));pointer-events:none}
.vcard .label p{color:#fff;font-size:12px;font-weight:600;margin:0}
@media(max-width:768px){.gp{grid-template-columns:repeat(2,1fr)}.gp img{height:150px}.eg{grid-template-columns:1fr!important}.vg{grid-template-columns:repeat(2,1fr)!important}}
@keyframes sc{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(12px)}}
</style>
</head>

document.addEventListener("DOMContentLoaded", function(){
  // Build page
  document.body.innerHTML = buildPage();
  
  // Intersection observer for fade-in
  document.querySelectorAll('.sec').forEach(el => {
    new IntersectionObserver(([e]) => {
      if(e.isIntersecting) el.classList.add('vis');
    },{threshold:0.1}).observe(el);
  });

  // Menu tabs
  // Event delegation for menu buttons
  document.addEventListener('click', function(e) {
    if(e.target.classList.contains('mt') && e.target.dataset.menu) {
      switchMenu(e.target.dataset.menu);
    }
  });

  window.switchMenu = function(name) {
    document.querySelectorAll('.mt').forEach(b => b.classList.toggle('a', b.dataset.menu === name));
    const m = MENUS[name];
    let html = '<p style="font-size:14px;color:#7a6e62;margin-bottom:24px;text-align:center">'+m.desc+'</p>';
    for(const [cat, items] of Object.entries(m.cats)) {
      html += '<div style="margin-bottom:24px"><h3 class="tc" style="font-size:16px;font-weight:700;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid #e8ddd0">'+cat+'</h3>';
      items.forEach(item => html += '<p style="font-size:14px;color:#4a3f35;padding:4px 0">'+item+'</p>');
      html += '</div>';
    }
    if(name === "חלבי") html += '<p style="font-size:13px;color:#9a8e82;text-align:center;margin-top:16px;font-style:italic">ניתן לשדרג לתפריט חלבי-פרימיום — פאני פורי סלמון | טטאקי טונה</p>';
    document.getElementById('menu-content').innerHTML = html;
  };
});
